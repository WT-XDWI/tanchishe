<canvas id=c width=400 height=400></canvas><script>
c=document.getElementById('c');g=c.getContext('2d');s=[[10,10],[9,10],[8,10]];d=2;f=[15,15];sc=0;
function step(){
h=[s[0][0],s[0][1]];d==0?h[1]--:d==1?h[0]++:d==2?h[1]++:h[0]--;
if(h[0]<0||h[0]>19||h[1]<0||h[1]>19)return alert('GAME OVER '+sc);
ate=h[0]==f[0]&&h[1]==f[1];n=[h].concat(s);if(!ate)n.pop();
for(i=1;i<n.length;i++)if(n[i][0]==h[0]&&n[i][1]==h[1])return alert('GAME OVER '+sc);
s=n;if(ate){sc++;f=[~~(Math.random()*20),~~(Math.random()*20)]}
g.clearRect(0,0,400,400);
g.strokeStyle='#333';g.lineWidth=.5;
for(i=0;i<=20;i++){g.beginPath();g.moveTo(i*20,0);g.lineTo(i*20,400);g.stroke();g.beginPath();g.moveTo(0,i*20);g.lineTo(400,i*20);g.stroke()}
g.fillStyle='#f00';g.fillRect(f[0]*20,f[1]*20,20,20);
g.fillStyle='#0f0';for(i=0;i<s.length;i++)g.fillRect(s[i][0]*20,s[i][1]*20,20,20);
g.fillStyle='#fff';g.font='16px sans-serif';g.fillText(sc,10,20)
}
setInterval(step,100);onkeydown=function(e){k=e.keyCode;k==38?d=0:k==39?d=1:k==40?d=2:k==37?d=3:0}
</script>
